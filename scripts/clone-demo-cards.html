<!-- POC-DEMO-INJECT:start  (added by scripts/inject-search.mjs — do not edit inline) -->
<style id="poc-demo-style">
  /* The clone's global CSS uses content-box; force border-box + reset margins so
     padding doesn't overflow the grid track (that was clipping "Try this search"). */
  .poc-demo, .poc-demo *{box-sizing:border-box;}
  .poc-demo{background:#f6f8fb;padding:72px 0;border-top:1px solid #eef2f7;}
  .poc-demo__wrap{max-width:1200px;margin:0 auto;padding:0 48px;}
  .poc-demo__eyebrow{font-family:adgm-gilroy,sans-serif;font-weight:600;font-size:13px;letter-spacing:.12em;
    text-transform:uppercase;color:#0088ff;margin:0 0 12px;}
  .poc-demo__head{font-family:adgm-gilroy,sans-serif;font-weight:300;font-size:clamp(28px,3.4vw,40px);
    line-height:1.12;color:#0a2540;margin:0 0 14px;}
  .poc-demo__sub{font-family:adgm-gilroy,sans-serif;font-weight:400;font-size:17px;line-height:1.55;
    color:#5b6b82;max-width:64ch;margin:0 0 40px;}
  .poc-demo__grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:stretch;}
  @media (max-width:1000px){.poc-demo__grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:640px){.poc-demo__grid{grid-template-columns:1fr;}.poc-demo__wrap{padding:0 22px;}.poc-demo{padding:52px 0;}}
  .poc-demo__card{display:flex;flex-direction:column;text-decoration:none;background:#fff;
    border:1px solid #e3e9f2;border-radius:18px;padding:26px 26px 24px;min-height:280px;
    box-shadow:0 1px 2px rgba(10,37,64,.04);
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;}
  .poc-demo__card:hover{transform:translateY(-4px);border-color:rgba(0,136,255,.45);
    box-shadow:0 18px 40px rgba(10,37,64,.14);}
  .poc-demo__icon{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
    background:rgba(0,136,255,.10);color:#0088ff;margin-bottom:18px;flex:0 0 auto;}
  .poc-demo__icon svg{width:22px;height:22px;display:block;}
  .poc-demo__tag{font-family:adgm-gilroy,sans-serif;font-weight:600;font-size:11.5px;letter-spacing:.06em;
    text-transform:uppercase;color:#8493a8;margin:0 0 9px;}
  .poc-demo__q{font-family:adgm-gilroy,sans-serif;font-weight:500;font-size:20px;line-height:1.28;
    color:#0a2540;margin:0 0 11px;}
  .poc-demo__desc{font-family:adgm-gilroy,sans-serif;font-weight:400;font-size:14.5px;line-height:1.55;
    color:#5b6b82;margin:0;}
  .poc-demo__cta{font-family:adgm-gilroy,sans-serif;font-weight:600;font-size:14.5px;color:#0088ff;
    display:inline-flex;align-items:center;gap:7px;margin-top:auto;padding-top:22px;}
  .poc-demo__card:hover .poc-demo__cta svg{transform:translateX(4px);}
  .poc-demo__cta svg{width:16px;height:16px;display:block;transition:transform .18s ease;flex:0 0 auto;}
</style>
<script id="poc-demo-script">
(function(){
  // Only render on the dedicated demo surface so "/" stays a pristine clone.
  // Shows on /demo (the child page) or when ?demo is present (console/manual).
  function enabled(){
    var p=location.pathname.replace(/\/+$/,'')||'/';
    return p==='/demo'||p.indexOf('/demo')===0||/(^|[?&])demo(=|&|$)/.test(location.search);
  }

  var I={
    user:'<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
    building:'<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/>',
    scale:'<path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>',
    alert:'<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><path d="M14 2v6h6"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
    landmark:'<line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/>',
    calendar:'<rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>',
    register:'<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>',
    arrow:'<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>'
  };
  function svg(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}

  var DEMOS=[
    {icon:'register', tag:'Public register', q:'FSRA Public Register',
     desc:'Browse all 3,560 firms, individuals and funds — classic filtering plus AI semantic search, paginated and deep-linked to ADGM.',
     href:'/public-registers/fsra', cta:'Open the register'},
    {icon:'user',     tag:'Smart disambiguation', q:'Who is Mr. Ali?',
     desc:'A broad question? The AI asks whether you mean an arbitration panelist or an approved person, then narrows to the right people.'},
    {icon:'building', tag:'Firm + connections',   q:"I'm looking for Sarwa",
     desc:'See a firm with its people, funds and any related court matters — connected in a single view, not scattered across pages.'},
    {icon:'scale',    tag:'Court matters',        q:'Latest hearings and judgments',
     desc:'Cases, hearings and judgments ordered by recency — each card deep-links to the exact filtered page on adgm.com.'},
    {icon:'alert',    tag:'Risk alerts',          q:'Recent public notices',
     desc:'Regulatory notices and enforcement actions surfaced as clear alerts to be aware of.'},
    {icon:'landmark', tag:'Guided answers',       q:'What do I need to set up a fund manager?',
     desc:'A grounded, plain-language answer drawn only from ADGM’s own published guidance — no invented facts.'},
    {icon:'calendar', tag:'What’s on',            q:'Upcoming events at ADGM',
     desc:'The newest events, forums and summits — sorted so the soonest appear first, with follow-ups to explore.'}
  ];

  function build(){
    if(!enabled()||document.querySelector('.poc-demo'))return;
    var sec=document.createElement('section');
    sec.className='poc-demo';
    var cards=DEMOS.map(function(d){
      var href=d.href||('/search?q='+encodeURIComponent(d.q));
      var cta=d.cta||'Try this search';
      return '<a class="poc-demo__card" href="'+href+'">'+
        '<span class="poc-demo__icon">'+svg(I[d.icon])+'</span>'+
        '<p class="poc-demo__tag">'+d.tag+'</p>'+
        '<h3 class="poc-demo__q">'+d.q+'</h3>'+
        '<p class="poc-demo__desc">'+d.desc+'</p>'+
        '<span class="poc-demo__cta">'+cta+' '+svg(I.arrow)+'</span>'+
      '</a>';
    }).join('');
    sec.innerHTML='<div class="poc-demo__wrap">'+
      '<p class="poc-demo__eyebrow">AI-powered search · POC</p>'+
      '<h2 class="poc-demo__head">See unified, generative search in action</h2>'+
      '<p class="poc-demo__sub">Pick a question to open the search and watch how ADGM’s firms, people, courts, funds, notices and news come back as one connected, grounded answer.</p>'+
      '<div class="poc-demo__grid">'+cards+'</div>'+
    '</div>';

    // Place it directly beneath the hero slider (falls back to before the hidden
    // <adgm-hero> if the slider hasn't been built for any reason).
    var hero=document.querySelector('.poc-hero')||document.querySelector('adgm-hero');
    if(hero&&hero.parentNode){hero.parentNode.insertBefore(sec,hero.nextSibling);}
    else{document.body.insertBefore(sec,document.body.firstChild);}
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',build);
  else build();
})();
</script>
<!-- POC-DEMO-INJECT:end -->
