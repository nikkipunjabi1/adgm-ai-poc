<!-- POC-SEARCH-INJECT:start  (added by scripts/inject-search.mjs — do not edit inline) -->
<style id="poc-search-style">
  #poc-search-overlay{position:fixed;inset:0;z-index:2147483600;display:none;
    background:rgba(8,15,40,.55);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
  #poc-search-overlay.open{display:block;}
  #poc-search-frame{position:absolute;left:50%;top:6vh;transform:translateX(-50%);
    width:min(960px,94vw);height:88vh;border:0;border-radius:18px;overflow:hidden;
    background:#fff;box-shadow:0 30px 90px rgba(0,0,0,.45);}
  @media (max-width:640px){#poc-search-frame{top:0;height:100vh;width:100vw;border-radius:0;}}
</style>
<div id="poc-search-overlay" role="dialog" aria-modal="true" aria-label="ADGM AI Search">
  <iframe id="poc-search-frame" title="ADGM AI Search" loading="lazy"></iframe>
</div>
<script id="poc-search-script">
(function(){
  var ov=document.getElementById('poc-search-overlay');
  var frame=document.getElementById('poc-search-frame');
  var loaded=false;
  function open(){
    if(!loaded){frame.src='/embed/search';loaded=true;}
    ov.classList.add('open');
    document.documentElement.style.overflow='hidden';
    setTimeout(function(){try{frame.contentWindow.focus();}catch(e){}},50);
  }
  function close(){ov.classList.remove('open');document.documentElement.style.overflow='';}
  ov.addEventListener('click',function(e){if(e.target===ov)close();});
  window.addEventListener('message',function(e){if(e.data&&e.data.type==='poc-close')close();});
  document.addEventListener('keydown',function(e){
    if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();open();}
    else if(e.key==='Escape'){close();}
  });
  // Intercept the homepage search affordance (class "search-button"/"search-container")
  // wherever it lives — light DOM or inside a web-component shadow tree. Also point
  // the "Public Registers" overview card at our working FSRA register clone.
  document.addEventListener('click',function(e){
    var path=(e.composedPath&&e.composedPath())||[];
    for(var i=0;i<path.length;i++){
      var el=path[i];
      if(el&&el.nodeType===1){
        var cls=(el.getAttribute&&el.getAttribute('class'))||'';
        var lbl=(el.getAttribute&&(el.getAttribute('aria-label')||el.getAttribute('title')))||'';
        if(/search-(button|container|icon|trigger)/i.test(cls)||/^search$/i.test(lbl)){
          e.preventDefault();e.stopPropagation();open();return;
        }
        var href=(el.getAttribute&&el.getAttribute('href'))||'';
        if(el.tagName&&el.tagName.toLowerCase()==='adgm-article-card'&&href.replace(/\/+$/,'')==='/public-registers'){
          e.preventDefault();e.stopPropagation();window.location.href='/public-registers/fsra';return;
        }
      }
    }
  },true);
})();
</script>
<!-- POC-SEARCH-INJECT:end -->
